name: Update CPI data

on:
  schedule:
    - cron: "30 15 * * 1-5"
  workflow_dispatch:

concurrency:
  group: update-cpi-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test Python updater
        run: python -m unittest discover -s tests/python -p "test_*.py"

      - name: Fetch latest CPI data
        env:
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: python scripts/update_cpi_data.py

      - name: Commit changed snapshot
        run: |
          if git diff --quiet -- lib/cpi/data/latest.json; then
            echo "No CPI data change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/cpi/data/latest.json
          git commit -m "data: update CPI snapshot"
          git push
